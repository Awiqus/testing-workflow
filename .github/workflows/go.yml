name: Go

on: 
  push: 
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3

      - name: Build
        run: go build -v ./...

  tests: 
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3

      - name: Test
        run: go test -v ./...
  
  race-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3

      - name: Test
        run: go test -race -v ./...
  
  lint:
    needs: [tests, race-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3
      - uses: golangci/golangci-lint-action@v6.0.1

